services:
  forgeops-api:
    build: .
    container_name: forgeops-api
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./forgeops.db:/data/forgeops.db
    environment:
      - FORGEOPS_DB_PATH=/data/forgeops.db
      - FORGEOPS_API_HOST=0.0.0.0
      - FORGEOPS_API_PORT=8002
    networks:
      - nginx-manager-network

networks:
  nginx-manager-network:
    external: true
